<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>政府採購法隨機題庫</title>
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f4f6f8;color:#17212b;font-family:system-ui,-apple-system,"Segoe UI","Noto Sans TC",sans-serif}
    .loading{width:min(420px,calc(100% - 40px));padding:28px;border:1px solid #d7dee5;border-radius:18px;background:#fff;box-shadow:0 14px 40px rgba(19,39,52,.1);text-align:center}
    .loading strong{display:block;font-size:1.2rem;margin-bottom:8px}.loading span{color:#5f6b76}
    @media(prefers-color-scheme:dark){body{background:#10161b;color:#eef4f7}.loading{background:#182127;border-color:#34434c}.loading span{color:#aebbc3}}
  </style>
</head>
<body>
  <div class="loading" id="loading"><strong>載入題庫中…</strong><span>正在準備精簡解題與快速刷題介面</span></div>
  <script>
  (async()=>{
    const paths=['legacy.html','assets/quick_style.css','assets/quick_core.js','assets/quick_refs.js','assets/quick_notes.js','assets/quick_submit.js'];
    const responses=await Promise.all(paths.map(path=>fetch(path,{cache:'no-store'})));
    responses.forEach((response,index)=>{if(!response.ok)throw new Error(`${paths[index]}: HTTP ${response.status}`)});
    const [legacy,style,core,refs,notes,submit]=await Promise.all(responses.map(response=>response.text()));
    let page=legacy;
    page=page.replace('</style>',`\n${style}\n</style>`);
    const helperMarker='function currentSelection() {';
    if(!page.includes(helperMarker))throw new Error('找不到解題輔助程式插入點');
    page=page.replace(helperMarker,`${core}\n\n${refs}\n\n${notes}\n\n${helperMarker}`);
    const start=page.indexOf('function submitAnswer(value) {');
    const end=page.indexOf('\nfunction syncExplainToggle()',start);
    if(start<0||end<0)throw new Error('找不到作答程式替換點');
    page=page.slice(0,start)+submit+'\n'+page.slice(end);
    page=page.replace('>看解析</button>','>看解題</button>');
    page=page.replace("(expanded ? '收合解析' : '看解析') : '看解析'","(expanded ? '收合解題' : '看解題') : '看解題'");
    page=page.replace('解析預設縮起；需要時再按「看解析」','解題預設縮起；需要時再按「看解題」');
    if(!page.includes('function buildQuickExplanation(q)')||!page.includes('展開精簡解題'))throw new Error('精簡解題介面驗證失敗');
    document.open();document.write(page);document.close();
  })().catch(error=>{
    console.error(error);
    document.getElementById('loading').innerHTML='<strong>題庫載入失敗</strong><span>請重新整理頁面；仍無法開啟時，可先使用 <a href="legacy.html">備援完整版</a>。</span>';
  });
  </script>
</body>
</html>
