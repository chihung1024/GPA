<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#f4f7fb">
<title>ж”ҝеәңжҺЎиіјжі•йҡЁж©ҹйЎҢеә«</title>
<style>
:root{font-family:system-ui,-apple-system,"Noto Sans TC","Microsoft JhengHei",sans-serif;color:#14213d;background:#f4f7fb}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px}main{width:min(680px,100%);padding:30px;border:1px solid #dbe3ee;border-radius:18px;background:#fff;box-shadow:0 18px 50px rgba(20,33,61,.09);text-align:center}.spinner{width:44px;height:44px;margin:0 auto 18px;border:5px solid #dbe3ee;border-top-color:#2457a7;border-radius:50%;animation:spin .75s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}h1{font-size:1.35rem;margin:0 0 10px}p{line-height:1.7;margin:0;color:#52657c}progress{width:100%;height:12px;margin:22px 0 8px}#error{display:none;text-align:left;white-space:pre-wrap;color:#9f1d1d;background:#fff1f1;border:1px solid #efcaca;border-radius:12px;padding:14px;margin-top:18px}button{display:none;margin:16px auto 0;border:0;border-radius:10px;padding:11px 18px;background:#2457a7;color:#fff;font-weight:700;cursor:pointer}.note{font-size:.9rem;margin-top:10px}
</style>
</head>
<body>
<main>
<div class="spinner" id="spinner" aria-hidden="true"></div>
<h1>жӯЈеңЁијүе…Ҙе®Ңж•ҙйЎҢеә«</h1>
<p id="status">жә–еӮҷ 3,599 йЎҢиҲҮйҖҗйҒёй …жі•иҰҸи§ЈжһҗвҖҰ</p>
<progress id="progress" value="0" max="7"></progress>
<p class="note" id="note">йҰ–ж¬Ўй–Ӣе•ҹйңҖдёӢијүйЎҢеә«пјӣжҲҗеҠҹеҫҢжңғдҝқз•ҷжң¬ж©ҹеҝ«еҸ–гҖӮ</p>
<div id="error" role="alert"></div>
<button id="retry" type="button">йҮҚж–°ијүе…Ҙ</button>
</main>
<script type="module">
const PART_COUNT=5;
const CACHE_NAME="gpa-quiz-v4";
const CACHE_KEY=new URL("__cached_full_quiz_v4.html",location.href).href;
const VERSION="20260701-2";
const statusEl=document.getElementById("status"),progressEl=document.getElementById("progress"),errorEl=document.getElementById("error"),retry=document.getElementById("retry"),spinner=document.getElementById("spinner"),note=document.getElementById("note");
const sleep=()=>new Promise(r=>requestAnimationFrame(r));
function normalizeBase64(value){return String(value).replace(/\s+/g,"").replace(/[\u200B-\u200D\uFEFF]/g,"").replace(/-/g,"+").replace(/_/g,"/").replace(/[^A-Za-z0-9+/=]/g,"")}
function decodeBase64(value){let s=normalizeBase64(value).replace(/=+$/g,"");if(s.length%4===1)throw new Error("йЎҢеә«иіҮж–ҷй•·еәҰдёҚе®Ңж•ҙ");s+="=".repeat((4-s.length%4)%4);const raw=atob(s),out=new Uint8Array(raw.length);for(let i=0;i<raw.length;i++)out[i]=raw.charCodeAt(i);return out}
function validPage(page){return /^\s*<!doctype html>/i.test(page)&&page.includes("const QUESTION_BANK =")&&page.includes("ж”ҝеәңжҺЎиіјжі•йҡЁж©ҹйЎҢеә«")}
async function openPage(page){if(!validPage(page))throw new Error("йЎҢеә«е…§е®№й©—иӯүеӨұж•—");document.open();document.write(page);document.close()}
async function readCache(){if(!("caches" in globalThis))return null;try{const hit=await (await caches.open(CACHE_NAME)).match(CACHE_KEY);if(!hit)return null;const page=await hit.text();return validPage(page)?page:null}catch{return null}}
async function saveCache(page){if(!("caches" in globalThis))return;try{const cache=await caches.open(CACHE_NAME);await cache.put(CACHE_KEY,new Response(page,{headers:{"Content-Type":"text/html;charset=utf-8"}}))}catch(error){console.warn("йЎҢеә«еҝ«еҸ–еӨұж•—",error)}}
async function fetchPart(i){const url=new URL(`payload2/${i}.txt?v=${VERSION}`,new URL(".",location.href));const res=await fetch(url,{cache:"no-cache"});if(!res.ok)throw new Error(`йЎҢеә«иіҮж–ҷ ${i+1}/${PART_COUNT} ијүе…ҘеӨұж•—пјҲHTTP ${res.status}пјү`);const text=await res.text();if(!text.trim())throw new Error(`йЎҢеә«иіҮж–ҷ ${i+1}/${PART_COUNT} зӮәз©ә`);progressEl.value=i+1;statusEl.textContent=`е·Іијүе…Ҙ ${i+1} / ${PART_COUNT} д»ҪйЎҢеә«иіҮж–ҷ`;return text}
async function nativeBrotli(bytes){try{const stream=new Blob([bytes]).stream().pipeThrough(new DecompressionStream("brotli"));return new Uint8Array(await new Response(stream).arrayBuffer())}catch{return null}}
function timeout(promise,ms,label){return Promise.race([promise,new Promise((_,reject)=>setTimeout(()=>reject(new Error(`${label} йҖҫжҷӮ`)),ms))])}
async function loadDecoder(){const urls=[
  "https://unpkg.com/brotli-dec-wasm@2.3.2/index.js?module",
  "https://esm.sh/brotli-dec-wasm@2.3.2",
  "https://cdn.jsdelivr.net/npm/brotli-dec-wasm@2.3.2/index.js"
];const errors=[];for(const url of urls){statusEl.textContent="жӯЈеңЁжә–еӮҷйЎҢеә«и§ЈеЈ“зё®е…ғд»¶вҖҰ";try{const mod=await timeout(import(url),12000,url);const api=await timeout(Promise.resolve(mod.default),12000,`${url} еҲқе§ӢеҢ–`);if(api&&typeof api.decompress==="function")return api;if(mod&&typeof mod.decompress==="function")return mod;throw new Error("жЁЎзө„жңӘжҸҗдҫӣ decompress()") }catch(error){errors.push(`${url}\n${String(error?.message||error)}`)}}throw new Error(`и§ЈеЈ“зё®е…ғд»¶зҡҶз„Ўжі•ијүе…ҘгҖӮ\n\n${errors.join("\n\n")}`)}
async function boot(){const cached=await readCache();if(cached){statusEl.textContent="жӯЈеңЁй–Ӣе•ҹжң¬ж©ҹеҝ«еҸ–йЎҢеә«вҖҰ";progressEl.value=7;await sleep();return openPage(cached)}const parts=[];for(let i=0;i<PART_COUNT;i++){parts.push(await fetchPart(i));await sleep()}statusEl.textContent="жӯЈеңЁи§ЈзўјйЎҢеә«иіҮж–ҷвҖҰ";progressEl.value=6;await sleep();const packed=decodeBase64(parts.join(""));let output=await nativeBrotli(packed);if(!output){const decoder=await loadDecoder();output=decoder.decompress(packed)}statusEl.textContent="жӯЈеңЁй©—иӯүдёҰе„ІеӯҳйЎҢеә«вҖҰ";progressEl.value=7;await sleep();const page=new TextDecoder("utf-8").decode(output);if(!validPage(page))throw new Error("йЎҢеә«и§ЈеЈ“зё®е®ҢжҲҗпјҢдҪҶе…§е®№й©—иӯүеӨұж•—гҖӮи«Ӣжё…йҷӨз¶Із«ҷеҝ«еҸ–еҫҢеҶҚи©ҰгҖӮ");await saveCache(page);statusEl.textContent="йЎҢеә«ијүе…Ҙе®ҢжҲҗпјҢжӯЈеңЁй–Ӣе•ҹвҖҰ";note.textContent="дёӢж¬Ўй–Ӣе•ҹе°Үе„Әе…ҲдҪҝз”Ёжң¬ж©ҹеҝ«еҸ–гҖӮ";await sleep();return openPage(page)}
boot().catch(err=>{console.error(err);spinner.style.display="none";progressEl.style.display="none";statusEl.textContent="йЎҢеә«ијүе…ҘеӨұж•—";note.style.display="none";errorEl.style.display="block";errorEl.textContent=String(err&&err.message||err);retry.style.display="block"});
retry.addEventListener("click",async()=>{try{if("caches" in globalThis)await caches.delete(CACHE_NAME)}finally{location.reload()}});
</script>
</body>
</html>
