name: Build local gzip quiz payload

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - '.github/local-gzip-trigger'

permissions:
  contents: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Rebuild gzip payload from existing Brotli payload
        id: rebuild
        continue-on-error: true
        run: |
          python -m pip install --disable-pip-version-check brotli
          python <<'PY'
          from pathlib import Path
          import base64, brotli, gzip, hashlib, json, re, traceback

          out = Path('payload3')
          out.mkdir(exist_ok=True)
          try:
              parts = []
              stats = []
              for i in range(5):
                  p = Path(f'payload2/{i}.txt')
                  if not p.exists():
                      raise FileNotFoundError(f'missing {p}')
                  value = p.read_text(encoding='utf-8')
                  parts.append(value)
                  stats.append({'part': i, 'chars': len(value), 'sha256': hashlib.sha256(value.encode()).hexdigest()})

              raw = ''.join(parts)
              b64 = re.sub(r'\s+', '', raw).replace('-', '+').replace('_', '/')
              b64 = re.sub(r'[^A-Za-z0-9+/=]', '', b64).rstrip('=')
              if len(b64) % 4 == 1:
                  raise ValueError(f'invalid base64 length: {len(b64)}')
              b64 += '=' * ((4 - len(b64) % 4) % 4)

              compressed = base64.b64decode(b64, validate=True)
              html = brotli.decompress(compressed)
              text_head = html[:500].decode('utf-8', errors='replace').lower()
              if '<!doctype html>' not in text_head:
                  raise ValueError('decompressed payload is not HTML')
              if b'const QUESTION_BANK =' not in html or b'3,599' not in html:
                  raise ValueError('quiz payload validation failed')

              gz = gzip.compress(html, compresslevel=9, mtime=0)
              encoded = base64.b64encode(gz).decode('ascii')
              for old in out.glob('*.txt'):
                  old.unlink()
              chunk_size = 800_000
              chunks = [encoded[i:i+chunk_size] for i in range(0, len(encoded), chunk_size)]
              for i, chunk in enumerate(chunks):
                  (out / f'{i}.txt').write_text(chunk, encoding='ascii')

              manifest = {
                  'source_bytes': len(html),
                  'gzip_bytes': len(gz),
                  'base64_chars': len(encoded),
                  'parts': len(chunks),
                  'part_sizes': [len(x) for x in chunks],
                  'source_sha256': hashlib.sha256(html).hexdigest(),
                  'gzip_sha256': hashlib.sha256(gz).hexdigest(),
                  'input_parts': stats,
              }
              (out / 'manifest.json').write_text(json.dumps(manifest, ensure_ascii=False, indent=2), encoding='utf-8')
              (out / 'error.txt').unlink(missing_ok=True)
              print(json.dumps(manifest, ensure_ascii=False, indent=2))
              if len(chunks) != 5:
                  raise ValueError(f'unexpected part count: {len(chunks)}')
          except Exception:
              diagnostic = {
                  'traceback': traceback.format_exc(),
                  'payload2_exists': [Path(f'payload2/{i}.txt').exists() for i in range(5)],
                  'payload2_sizes': [Path(f'payload2/{i}.txt').stat().st_size if Path(f'payload2/{i}.txt').exists() else None for i in range(5)],
              }
              (out / 'error.txt').write_text(json.dumps(diagnostic, ensure_ascii=False, indent=2), encoding='utf-8')
              print(json.dumps(diagnostic, ensure_ascii=False, indent=2))
              raise
          PY
      - name: Commit generated payload or diagnostics to pull-request branch
        if: always()
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add payload3
          if git diff --cached --quiet; then
            echo 'No changes to commit'
          else
            git commit -m 'Build local gzip quiz payload'
            git push origin HEAD:${{ github.head_ref }}
          fi
      - name: Fail when rebuild failed
        if: steps.rebuild.outcome == 'failure'
        run: exit 1
