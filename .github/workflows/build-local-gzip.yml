name: Validate local gzip quiz data

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - '.github/local-gzip-trigger'

permissions:
  contents: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate existing local GZIP data parts
        id: rebuild
        continue-on-error: true
        run: |
          python <<'PY'
          from pathlib import Path
          import base64, gzip, hashlib, json, re, traceback

          out = Path('payload3')
          out.mkdir(exist_ok=True)
          try:
              files = sorted(Path('data_parts').glob('*.txt'))
              if not files:
                  raise FileNotFoundError('no data_parts/*.txt files found')
              stats = []
              pieces = []
              for p in files:
                  value = p.read_text(encoding='utf-8')
                  pieces.append(value)
                  stats.append({'name': p.name, 'chars': len(value), 'sha256': hashlib.sha256(value.encode()).hexdigest()})

              raw = ''.join(pieces)
              b64 = re.sub(r'\s+', '', raw).replace('-', '+').replace('_', '/')
              b64 = re.sub(r'[^A-Za-z0-9+/=]', '', b64).rstrip('=')
              if len(b64) % 4 == 1:
                  raise ValueError(f'invalid base64 length: {len(b64)}')
              b64 += '=' * ((4 - len(b64) % 4) % 4)
              gz = base64.b64decode(b64, validate=True)
              payload = gzip.decompress(gz)
              db = json.loads(payload.decode('utf-8'))
              questions = db.get('q') or db.get('questions')
              if not isinstance(questions, list):
                  raise ValueError(f'question list missing; keys={list(db)[:20]}')
              if len(questions) != 3599:
                  raise ValueError(f'unexpected question count: {len(questions)}')

              manifest = {
                  'status': 'ok',
                  'files': len(files),
                  'file_stats': stats,
                  'base64_chars': len(b64),
                  'gzip_bytes': len(gz),
                  'json_bytes': len(payload),
                  'json_sha256': hashlib.sha256(payload).hexdigest(),
                  'top_level_keys': list(db.keys()),
                  'questions': len(questions),
                  'first_question_type': type(questions[0]).__name__ if questions else None,
                  'first_question_preview': questions[0] if questions else None,
              }
              (out / 'medium-manifest.json').write_text(json.dumps(manifest, ensure_ascii=False, indent=2), encoding='utf-8')
              (out / 'error.txt').unlink(missing_ok=True)
              print(json.dumps(manifest, ensure_ascii=False, indent=2))
          except Exception:
              diagnostic = {
                  'status': 'error',
                  'traceback': traceback.format_exc(),
                  'data_parts': [p.name for p in sorted(Path('data_parts').glob('*.txt'))],
                  'data_part_sizes': [p.stat().st_size for p in sorted(Path('data_parts').glob('*.txt'))],
              }
              (out / 'error.txt').write_text(json.dumps(diagnostic, ensure_ascii=False, indent=2), encoding='utf-8')
              print(json.dumps(diagnostic, ensure_ascii=False, indent=2))
              raise
          PY
      - name: Commit validation result to pull-request branch
        if: always()
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add payload3
          if git diff --cached --quiet; then
            echo 'No changes to commit'
          else
            git commit -m 'Validate local gzip quiz data'
            git push origin HEAD:${{ github.head_ref }}
          fi
      - name: Fail when validation failed
        if: steps.rebuild.outcome == 'failure'
        run: exit 1
