name: Run gzip builder
on:
  pull_request:
    branches: [main]
    types: [synchronize]
    paths:
      - '.github/local-gzip-trigger'
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install zstandard
      - run: python scripts/build_gzip.py
      - run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add gzip_data
          git commit -m 'Generate local gzip data' || true
          git push origin HEAD:${{ github.head_ref }}
