name: Compact question explanations

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/compact-explanations.yml

permissions:
  contents: write

jobs:
  compact:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Rewrite explanation renderer
        run: python tools/compact_explanations.py
      - name: Validate generated HTML
        run: |
          git diff --check
          grep -q 'function buildQuickExplanation(q)' index.html
          grep -q '展開精簡解題' index.html
          grep -q '逐選項速解' index.html
      - name: Commit index.html
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          git diff --cached --quiet || git commit -m 'Condense explanations for fast practice'
          git push

# One-time merge trigger: 2026-07-02
