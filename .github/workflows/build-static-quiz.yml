name: Build static procurement quiz

on:
  push:
    paths:
      - .github/workflows/build-static-quiz.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Brotli decoder
        run: python -m pip install --disable-pip-version-check brotli

      - name: Convert existing payload to browser-native gzip
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path
          import base64
          import gzip
          import re
          import brotli

          files = [Path(f'payload2/{i}.txt') for i in range(5)]
          missing = [str(p) for p in files if not p.exists()]
          if missing:
              raise SystemExit(f'Missing payload files: {missing}')

          parts = [re.sub(r'\s+', '', p.read_text(encoding='utf-8')) for p in files]

          def decode_one(value: str) -> bytes:
              value = re.sub(r'[^A-Za-z0-9+/=]', '', value).replace('=', '')
              if len(value) % 4 == 1:
                  raise ValueError('Invalid Base64 payload length')
              value += '=' * ((4 - len(value) % 4) % 4)
              return base64.b64decode(value)

          candidates = []
          try:
              candidates.append(b''.join(decode_one(part) for part in parts))
          except Exception as exc:
              print('Per-file Base64 candidate failed:', exc)

          try:
              candidates.append(decode_one(''.join(parts)))
          except Exception as exc:
              print('Joined Base64 candidate failed:', exc)

          html = None
          for candidate in candidates:
              try:
                  decoded = brotli.decompress(candidate)
                  if decoded.lstrip().lower().startswith(b'<!doctype html') or b'<html' in decoded[:500].lower():
                      html = decoded
                      break
              except Exception as exc:
                  print('Brotli candidate failed:', exc)

          if html is None:
              raise SystemExit('Unable to decode the existing quiz payload')

          compressed = gzip.compress(html, compresslevel=9, mtime=0)
          Path('quiz-app.html.gz').write_bytes(compressed)

          index = r'''<!doctype html>
          <html lang="zh-Hant">
          <head>
          <meta charset="utf-8">
          <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
          <meta name="theme-color" content="#f4f7fb">
          <title>採購法隨機題庫</title>
          <style>
          html,body{height:100%;margin:0;font-family:system-ui,-apple-system,"Noto Sans TC","Microsoft JhengHei",sans-serif;background:#f4f7fb;color:#14213d}body{display:grid;place-items:center}main{width:min(680px,calc(100% - 40px));padding:30px;border:1px solid #dbe3ee;border-radius:18px;background:#fff;box-shadow:0 18px 50px rgba(20,33,61,.09);text-align:center}.spinner{width:42px;height:42px;margin:0 auto 18px;border:5px solid #dbe3ee;border-top-color:#2457a7;border-radius:50%;animation:spin .75s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}h1{font-size:1.35rem;margin:0 0 10px}p{line-height:1.7;margin:0;color:#52657c}#progress{margin-top:10px;font-size:.92rem;color:#708197}#error{display:none;margin-top:18px;padding:14px;border-radius:10px;background:#fff0f0;color:#9f1d1d;text-align:left;white-space:pre-wrap}button{display:none;margin:16px auto 0;padding:10px 18px;border:0;border-radius:9px;background:#2457a7;color:#fff;font:inherit;font-weight:700}
          </style>
          </head>
          <body>
          <main>
          <div class="spinner" aria-hidden="true"></div>
          <h1>正在開啟採購法題庫</h1>
          <p>題庫資料已由網站本身提供，不再連線下載第三方元件。</p>
          <div id="progress">讀取題庫中…</div>
          <div id="error"></div>
          <button id="retry" type="button">重新載入</button>
          </main>
          <script>
          (()=>{
            const $=s=>document.querySelector(s);
            const fail=err=>{
              console.error(err);
              $('.spinner').style.display='none';
              $('#progress').style.display='none';
              const box=$('#error');box.style.display='block';
              box.textContent='題庫載入失敗：'+(err?.message||String(err))+'\n請按「重新載入」；若仍失敗，請關閉此分頁後再開啟。';
              $('#retry').style.display='block';
            };
            $('#retry').addEventListener('click',()=>location.reload());

            (async()=>{
              if(!('DecompressionStream' in window)){
                throw new Error('此瀏覽器版本過舊，請更新 Chrome、Edge、Firefox 或 Safari。');
              }

              const controller=new AbortController();
              const timer=setTimeout(()=>controller.abort(),30000);
              const response=await fetch('quiz-app.html.gz',{cache:'force-cache',signal:controller.signal});
              if(!response.ok)throw new Error('題庫檔案 HTTP '+response.status);
              if(!response.body)throw new Error('瀏覽器不支援串流讀取');

              $('#progress').textContent='解壓縮並開啟題庫…';
              const stream=response.body.pipeThrough(new DecompressionStream('gzip'));
              const reader=stream.getReader();
              const decoder=new TextDecoder('utf-8');

              const first=await reader.read();
              if(first.done||!first.value)throw new Error('題庫內容為空');
              const firstText=decoder.decode(first.value,{stream:true});
              if(!/<(?:!doctype|html)[\s>]/i.test(firstText.slice(0,500)))throw new Error('題庫格式不正確');

              clearTimeout(timer);
              document.open();
              document.write(firstText);

              while(true){
                const part=await reader.read();
                if(part.done)break;
                document.write(decoder.decode(part.value,{stream:true}));
              }
              document.write(decoder.decode());
              document.close();
            })().catch(fail);
          })();
          </script>
          </body>
          </html>
          '''

          # Remove indentation introduced by the Python heredoc for cleaner output.
          index = '\n'.join(line[10:] if line.startswith('          ') else line for line in index.splitlines()) + '\n'
          Path('index.html').write_text(index, encoding='utf-8')

          headers = '''/
            Cache-Control: no-cache, no-store, must-revalidate
          /index.html
            Cache-Control: no-cache, no-store, must-revalidate
          /quiz-app.html.gz
            Cache-Control: public, max-age=31536000, immutable
            Content-Type: application/gzip
          '''
          headers = '\n'.join(line[10:] if line.startswith('          ') else line for line in headers.splitlines()) + '\n'
          Path('_headers').write_text(headers, encoding='utf-8')

          print(f'Original HTML: {len(html):,} bytes')
          print(f'Gzip payload:  {len(compressed):,} bytes')
          PY

      - name: Commit generated static files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html quiz-app.html.gz _headers
          if git diff --cached --quiet; then
            echo "No generated changes"
          else
            git commit -m "Generate CDN-free quiz application"
            git push origin main
          fi
