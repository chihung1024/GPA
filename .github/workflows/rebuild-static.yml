name: Publish compact static quiz
on:
  push:
    paths:
      - .github/workflows/rebuild-static.yml
      - tools/build_quiz.py
      - BUILD_REQUEST.md
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - run: python3 -m pip install --disable-pip-version-check brotli zstandard
      - name: Generate static site
        run: |
          python3 tools/build_quiz.py
          rm -rf functions
          rm -f _routes.json compact-test.js BUILD_DIAGNOSTIC.txt BUILD_SUCCESS.txt
      - name: Commit generated files
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'Publish compact 3599-question static quiz' || exit 0
          git push origin main
