name: Rebuild static quiz

on:
  push:
    paths:
      - .github/workflows/rebuild-static.yml
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Rebuild index.html from stored payload
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import base64
          import re
          import subprocess

          files = sorted(Path('payload').glob('*.txt'))
          if not files:
              raise SystemExit('No payload files found')

          parts = [p.read_text(encoding='utf-8') for p in files]

          def clean(value):
              return re.sub(r'[^A-Za-z0-9+/=]', '', value)

          def decode_stream(value, max_trim=12):
              raw = clean(value).replace('=', '')
              results = []
              for trim in range(max_trim + 1):
                  text = raw[:-trim] if trim else raw
                  if not text or len(text) % 4 == 1:
                      continue
                  text += '=' * ((4 - len(text) % 4) % 4)
                  try:
                      data = base64.b64decode(text, validate=True)
                  except Exception:
                      continue
                  if data:
                      results.append(data)
              return results

          candidates = []
          candidates.extend(decode_stream(''.join(parts)))

          try:
              decoded_parts = []
              for part in parts:
                  options = decode_stream(part, max_trim=4)
                  if not options:
                      raise ValueError('part decode failed')
                  decoded_parts.append(options[0])
              candidates.append(b''.join(decoded_parts))
          except Exception as exc:
              print('Per-part candidate unavailable:', exc)

          seen = set()
          for number, data in enumerate(candidates):
              signature = (len(data), data[:16], data[-16:])
              if signature in seen:
                  continue
              seen.add(signature)
              source = Path(f'/tmp/quiz-{number}.zst')
              source.write_bytes(data)
              test = subprocess.run(['zstd', '--test', '--quiet', str(source)])
              if test.returncode != 0:
                  continue
              subprocess.run(
                  ['zstd', '--decompress', '--force', str(source), '-o', 'index.html'],
                  check=True,
              )
              html = Path('index.html').read_bytes()
              if b'<html' not in html[:1000].lower() and b'<!doctype html' not in html[:1000].lower():
                  continue
              print(f'Decoded {len(files)} payload files to {len(html):,} HTML bytes')
              break
          else:
              raise SystemExit('No valid Zstandard payload candidate found')
          PY

          rm -rf functions
          rm -f _routes.json
          printf '/\n  Cache-Control: no-cache, no-store, must-revalidate\n/index.html\n  Cache-Control: no-cache, no-store, must-revalidate\n' > _headers

      - name: Commit static site
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A index.html functions _routes.json _headers
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Publish self-contained static procurement quiz"
            git push origin main
          fi
