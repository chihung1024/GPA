name: Rebuild static quiz
on:
  push:
    paths: [.github/workflows/rebuild-static.yml]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - run: python3 -m pip install brotli
      - name: Produce static index
        run: |
          python3 <<'PY'
          from pathlib import Path
          import base64, brotli, re
          files=sorted(Path('payload2').glob('*.txt'))
          parts=[p.read_text() for p in files]
          variants=[]
          joined=re.sub(r'\s+','',''.join(parts))
          try: variants.append(('joined',base64.b64decode(joined,validate=True)))
          except Exception as e: print('joined',e)
          try:
              out=[]
              for part in parts:
                  s=re.sub(r'[^A-Za-z0-9+/]','',part)
                  s+='='*((4-len(s)%4)%4)
                  out.append(base64.b64decode(s,validate=True))
              variants.append(('parts',b''.join(out)))
          except Exception as e: print('parts',e)
          for name,data in variants:
              try:
                  html=brotli.decompress(data)
                  if b'<html' in html[:2000].lower() or b'<!doctype html' in html[:2000].lower():
                      Path('index.html').write_bytes(html)
                      Path('BUILD_SUCCESS.txt').write_text(f'{name}\n{len(html)}\n')
                      break
              except Exception as e: print(name,e)
          else: raise SystemExit('no valid payload')
          PY
          rm -rf functions
          rm -f _routes.json
          printf '/\n  Cache-Control: no-cache, no-store, must-revalidate\n' > _headers
      - name: Commit
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'Publish verified static quiz' || exit 0
          git push origin main
